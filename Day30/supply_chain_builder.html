<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supply Chain Builder</title>
<style>
  :root{
    --void:#080D18;
    --bg:#0A1120;
    --ledger:#111A2E;
    --surface:#141F38;
    --surface-2:#182548;
    --steel:#25314F;
    --steel-light:#33436B;
    --fog:#8B9BC0;
    --fog-dim:#5C6C93;
    --paper:#EAF0FB;
    --cargo:#F2A93B;
    --cargo-dim:#8A6323;
    --route:#2FD9C4;
    --route-dim:#1B7A6E;
    --alert:#F2685C;
    --alert-dim:#7A2E28;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:9px;
    --font-display: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --font-body: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(1100px 600px at 85% -10%, rgba(47,217,196,0.08), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(242,169,59,0.07), transparent 55%),
      var(--bg);
    color:var(--paper);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  ::selection{ background:var(--route); color:var(--void); }

  button{ font-family:inherit; }

  h1,h2,h3{
    font-family:var(--font-display);
    font-weight:700;
    letter-spacing:-0.02em;
    margin:0 0 12px;
    color:var(--paper);
  }
  p{ line-height:1.65; color:var(--fog); margin:0 0 12px; }
  p:last-child{ margin-bottom:0; }

  .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--route);
    font-weight:600;
    margin-bottom:10px;
  }

  /* ===== layout shell ===== */
  .app{ display:flex; flex-direction:column; min-height:100vh; }

  .app-header{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    gap:24px;
    padding:16px 32px;
    background:rgba(10,17,32,0.86);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--steel);
    flex-wrap:wrap;
  }
  .app-header__brand{
    display:flex; align-items:center; gap:10px;
    font-family:var(--font-display); font-weight:700; font-size:16px;
    letter-spacing:-0.01em; white-space:nowrap;
    color:var(--paper);
  }
  .app-header__mark{
    width:34px; height:34px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(145deg, var(--cargo), #c9861f);
    color:var(--void);
    box-shadow:0 4px 14px rgba(242,169,59,0.28);
  }

  .metrics-strip{
    display:flex; gap:22px; flex-wrap:wrap; flex:1; justify-content:flex-end;
  }
  .metric--compact{ width:130px; }

  .app-main{ flex:1; padding:40px 32px 80px; max-width:1180px; margin:0 auto; width:100%; }
  .app-footer{
    text-align:center; padding:22px; font-size:12px; color:var(--fog-dim);
    border-top:1px solid var(--steel); font-family:var(--font-mono); letter-spacing:0.03em;
  }

  .screen{ animation:rise 0.5s ease both; }
  @keyframes rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ===== buttons ===== */
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    border:1px solid var(--steel-light);
    background:var(--surface-2);
    color:var(--paper);
    padding:11px 18px;
    border-radius:999px;
    font-size:14px; font-weight:600;
    cursor:pointer;
    transition:transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .btn:hover{ transform:translateY(-1px); border-color:var(--route); box-shadow:0 6px 18px rgba(47,217,196,0.14); }
  .btn:active{ transform:translateY(0); }
  .btn--primary{
    background:linear-gradient(135deg, var(--cargo), #d9922b);
    border-color:transparent;
    color:#1A1000;
    box-shadow:0 8px 22px rgba(242,169,59,0.22);
  }
  .btn--primary:hover{ box-shadow:0 10px 26px rgba(242,169,59,0.34); }
  .btn--lg{ padding:14px 26px; font-size:15px; margin-top:8px; }

  /* ===== cards ===== */
  .card{
    background:var(--ledger);
    border:1px solid var(--steel);
    border-radius:var(--radius-lg);
    padding:26px;
    transition:border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
  }

  /* ===== welcome ===== */
  .welcome{
    display:grid; grid-template-columns:1.1fr 0.9fr; gap:48px; align-items:center;
  }
  .welcome__copy h1{ font-size:34px; line-height:1.18; margin-bottom:16px; }
  .lede{ font-size:16px; color:var(--fog); }
  .welcome__facts{
    display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:26px 0 28px;
  }
  .fact{
    background:var(--ledger); border:1px solid var(--steel); border-radius:var(--radius-md);
    padding:16px; transition:border-color 0.2s ease, transform 0.2s ease;
  }
  .fact:hover{ border-color:var(--route); transform:translateY(-2px); }
  .fact__title{ font-family:var(--font-display); font-weight:700; font-size:14px; margin-bottom:6px; }
  .fact__body{ font-size:12.5px; color:var(--fog-dim); line-height:1.5; }
  .welcome__visual{
    background:var(--ledger); border:1px solid var(--steel); border-radius:var(--radius-lg);
    padding:26px 20px; display:flex; flex-direction:column; gap:16px;
  }
  .welcome__caption{ font-size:12.5px; color:var(--fog-dim); text-align:center; line-height:1.5; }

  /* ===== route map (signature element) ===== */
  .route-map{
    display:flex; align-items:flex-start; gap:0;
    overflow-x:auto; padding:10px 2px 6px;
  }
  .route-node{
    display:flex; flex-direction:column; align-items:center; gap:8px;
    min-width:86px; flex-shrink:0; text-align:center;
  }
  .route-node__dot{
    width:46px; height:46px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--surface); border:1.5px solid var(--steel-light);
    color:var(--fog-dim);
    transition:all 0.4s cubic-bezier(.2,.9,.3,1.2);
  }
  .route-node--done .route-node__dot{
    background:linear-gradient(145deg, var(--route), var(--route-dim));
    border-color:var(--route);
    color:var(--void);
    box-shadow:0 0 0 4px rgba(47,217,196,0.12);
  }
  .route-node--active .route-node__dot{
    border-color:var(--cargo);
    color:var(--cargo);
    box-shadow:0 0 0 5px rgba(242,169,59,0.15);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 5px rgba(242,169,59,0.15); }
    50%{ box-shadow:0 0 0 9px rgba(242,169,59,0.06); }
  }
  .route-node__label{ font-size:11.5px; font-weight:600; color:var(--fog); white-space:nowrap; }
  .route-node--done .route-node__label{ color:var(--paper); }
  .route-node__choice{
    font-family:var(--font-mono); font-size:10px; color:var(--route);
    background:rgba(47,217,196,0.08); padding:2px 8px; border-radius:999px;
    white-space:nowrap;
  }
  .route-edge{
    flex:1; min-width:26px; height:2px; align-self:center; margin-top:-24px;
    background:repeating-linear-gradient(90deg, var(--steel) 0 6px, transparent 6px 12px);
    position:relative; top:0;
  }
  .route-edge--done{
    background:linear-gradient(90deg, var(--route), var(--route-dim));
  }

  /* ===== step dots ===== */
  .step-dots{ display:flex; gap:7px; justify-content:center; margin:18px 0 26px; }
  .step-dot{ width:7px; height:7px; border-radius:50%; background:var(--steel-light); transition:all 0.3s ease; }
  .step-dot--active{ background:var(--cargo); width:20px; border-radius:4px; }
  .step-dot--done{ background:var(--route); }

  /* ===== company screen ===== */
  .company-screen{ display:flex; flex-direction:column; align-items:flex-start; gap:22px; }
  .company-card{ width:100%; }
  .company-card__head{ display:flex; align-items:center; gap:16px; margin-bottom:22px; }
  .company-card__badge{
    width:56px; height:56px; border-radius:16px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--surface-2); border:1px solid var(--steel-light); color:var(--cargo);
  }
  .company-card__industry{ color:var(--route); font-family:var(--font-mono); font-size:12.5px; letter-spacing:0.03em; }
  .company-card__grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px;
    padding:18px; background:var(--surface); border-radius:var(--radius-md); border:1px solid var(--steel);
  }
  .company-fact__label{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--fog-dim); margin-bottom:5px; }
  .company-fact__value{ font-size:14px; font-weight:600; color:var(--paper); }
  .company-card__note{ font-size:14px; }

  /* ===== decision screen ===== */
  .decision-layout{ display:grid; grid-template-columns:0.85fr 1.15fr; gap:24px; align-items:start; }
  .concept-card{ position:sticky; top:100px; }
  .concept-block{ margin-bottom:16px; }
  .concept-block:last-child{ margin-bottom:0; }
  .concept-block__label{
    font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--cargo); margin-bottom:5px; font-weight:600;
  }
  .concept-block p{ font-size:13.5px; }

  .options-col{ display:flex; flex-direction:column; gap:18px; }
  .options-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  .option-card{
    text-align:left; cursor:pointer;
    background:var(--ledger); border:1.5px solid var(--steel); border-radius:var(--radius-md);
    padding:18px; color:var(--paper);
    display:flex; flex-direction:column; gap:10px;
    transition:border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
  }
  .option-card:hover:not(:disabled){ border-color:var(--steel-light); transform:translateY(-2px); background:var(--surface); }
  .option-card--selected{ border-color:var(--cargo); background:var(--surface-2); box-shadow:0 0 0 3px rgba(242,169,59,0.1); }
  .option-card--locked{ cursor:default; }
  .option-card--locked:not(.option-card--selected){ opacity:0.4; }
  .option-card:disabled{ pointer-events:none; }
  .option-card__head{ display:flex; align-items:center; justify-content:space-between; }
  .option-card__label{ font-weight:700; font-size:15px; }
  .option-card__blurb{ font-size:12.5px; margin:0; color:var(--fog); }
  .option-card__deltas{ display:flex; flex-wrap:wrap; gap:6px; margin-top:2px; }
  .delta-chip{
    font-family:var(--font-mono); font-size:10.5px; padding:3px 8px; border-radius:999px;
    border:1px solid transparent;
  }
  .delta-chip--good{ color:var(--route); background:rgba(47,217,196,0.09); border-color:rgba(47,217,196,0.25); }
  .delta-chip--bad{ color:var(--alert); background:rgba(242,104,92,0.09); border-color:rgba(242,104,92,0.25); }

  .tradeoff-card{ border-color:var(--cargo-dim); background:var(--surface-2); animation:rise 0.35s ease both; }
  .hint-card{
    padding:16px; border:1.5px dashed var(--steel-light); border-radius:var(--radius-md);
    color:var(--fog-dim); font-size:13px; text-align:center;
  }

  /* ===== metric bars ===== */
  .metric__head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .metric__label{ font-size:11.5px; color:var(--fog); font-weight:600; }
  .metric--compact .metric__label{ font-size:10.5px; }
  .metric__value{ font-family:var(--font-mono); font-size:12px; color:var(--paper); font-weight:700; }
  .metric__track{
    height:7px; border-radius:999px; background:var(--surface); overflow:hidden; border:1px solid var(--steel);
  }
  .metric--compact .metric__track{ height:5px; }
  .metric__fill{ height:100%; border-radius:999px; transition:width 0.7s cubic-bezier(.2,.8,.25,1); }
  .metric__fill--good{ background:linear-gradient(90deg, var(--route-dim), var(--route)); }
  .metric__fill--warn{ background:linear-gradient(90deg, var(--cargo-dim), var(--cargo)); }
  .metric__fill--bad{ background:linear-gradient(90deg, var(--alert-dim), var(--alert)); }
  .metric__hint{ font-size:10.5px; color:var(--fog-dim); margin-top:5px; }

  /* ===== gauge ===== */
  .gauge{ position:relative; width:200px; height:200px; margin:0 auto; }
  .gauge__svg{ width:100%; height:100%; transform:rotate(-90deg); }
  .gauge__track{ fill:none; stroke:var(--surface); stroke-width:14; }
  .gauge__fill{ fill:none; stroke-width:14; stroke-linecap:round; transition:stroke-dashoffset 0.3s ease; }
  .gauge__fill--good{ stroke:var(--route); }
  .gauge__fill--warn{ stroke:var(--cargo); }
  .gauge__fill--bad{ stroke:var(--alert); }
  .gauge__label{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .gauge__score{ font-family:var(--font-display); font-size:44px; font-weight:800; color:var(--paper); }
  .gauge__of{ font-size:11px; color:var(--fog-dim); font-family:var(--font-mono); letter-spacing:0.05em; }

  /* ===== dashboard ===== */
  .dashboard h2{ font-size:26px; }
  .dash-top{ display:grid; grid-template-columns:0.8fr 1.2fr; gap:20px; margin:20px 0; }
  .score-card{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
  .score-card__verdict{
    font-family:var(--font-mono); font-size:13px; color:var(--cargo); letter-spacing:0.04em; font-weight:600;
  }
  .route-summary-card{ display:flex; flex-direction:column; justify-content:center; }
  .metrics-card{ margin-bottom:20px; }
  .metrics-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:18px; margin-top:8px; }
  .dash-cols{ display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  .insight-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:12px; }
  .insight-list li{ display:flex; align-items:flex-start; gap:10px; font-size:13.5px; color:var(--fog); }
  .insight-list--good li svg{ color:var(--route); flex-shrink:0; margin-top:2px; }
  .insight-dot{ width:7px; height:7px; border-radius:50%; background:var(--alert); margin-top:6px; flex-shrink:0; }
  .risk-card{ border-color:var(--alert-dim); background:linear-gradient(160deg, rgba(242,104,92,0.07), var(--ledger)); margin-bottom:20px; }
  .risk-card p{ color:var(--paper); font-size:14.5px; }
  .improvements-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:8px; }
  .improvement-card{
    background:var(--surface); border:1px solid var(--steel); border-radius:var(--radius-md); padding:18px;
    transition:border-color 0.2s ease, transform 0.2s ease;
  }
  .improvement-card:hover{ border-color:var(--route); transform:translateY(-2px); }
  .improvement-card__num{
    width:26px; height:26px; border-radius:8px; background:var(--surface-2); border:1px solid var(--steel-light);
    display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:12px;
    color:var(--cargo); font-weight:700; margin-bottom:10px;
  }
  .improvement-card p{ font-size:13px; color:var(--fog); margin:0; }
  .dashboard > .btn--lg{ display:flex; margin:8px auto 0; }

  /* ===== responsive ===== */
  @media (max-width: 980px){
    .welcome{ grid-template-columns:1fr; }
    .decision-layout{ grid-template-columns:1fr; }
    .concept-card{ position:static; }
    .dash-top{ grid-template-columns:1fr; }
    .metrics-grid{ grid-template-columns:repeat(2,1fr); }
    .dash-cols{ grid-template-columns:1fr; }
    .improvements-grid{ grid-template-columns:1fr; }
    .welcome__facts{ grid-template-columns:1fr; }
  }
  @media (max-width: 640px){
    .app-header{ padding:14px 18px; }
    .app-main{ padding:26px 16px 60px; }
    .metrics-strip{ display:none; }
    .options-grid{ grid-template-columns:1fr; }
    .company-card__grid{ grid-template-columns:1fr; }
    .welcome__copy h1{ font-size:26px; }
    .metrics-grid{ grid-template-columns:1fr 1fr; }
    .card{ padding:18px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ================= DATA ================= */

const INDUSTRIES = [
  { name: "Athletic Footwear", products: ["running shoes", "trail sneakers", "sport sandals"], icon: "shoe" },
  { name: "Specialty Coffee", products: ["roasted coffee beans", "cold brew concentrate", "espresso pods"], icon: "coffee" },
  { name: "Consumer Electronics", products: ["wireless earbuds", "smart home hubs", "portable chargers"], icon: "chip" },
  { name: "Organic Skincare", products: ["face serums", "body lotions", "sunscreen sticks"], icon: "bottle" },
  { name: "Furniture", products: ["modular sofas", "standing desks", "outdoor chairs"], icon: "chair" },
  { name: "Toys & Games", products: ["building blocks", "board games", "plush toys"], icon: "toy" },
  { name: "Bicycles", products: ["commuter bikes", "e-bikes", "bike helmets"], icon: "bike" },
];

const REGIONS = [
  ["Canada", "Mexico", "the United States"],
  ["Germany", "France", "Spain", "Italy"],
  ["Japan", "South Korea", "Australia"],
  ["Brazil", "Argentina", "Chile"],
  ["the UK", "Ireland", "the Netherlands"],
];

const DEMAND_LEVELS = [
  { level: "Steady", note: "Demand is predictable and grows slowly, month over month." },
  { level: "Seasonal", note: "Demand spikes sharply around a few key months each year." },
  { level: "Explosive", note: "Demand is surging fast and outpacing what the business expected." },
];

const COMPANY_PREFIXES = ["Northbound", "Cedar & Co", "Bright Path", "Meridian", "Lumen", "Basecamp", "Solstice", "Anchorpoint", "Fieldstone", "Everline"];

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateCompany() {
  const industry = randomFrom(INDUSTRIES);
  const region = randomFrom(REGIONS);
  const demand = randomFrom(DEMAND_LEVELS);
  const countryCount = randomInt(2, region.length);
  const countries = region.slice(0, countryCount);
  const name = randomFrom(COMPANY_PREFIXES) + " " + industry.name.split(" ")[0];
  return {
    name,
    industry: industry.name,
    icon: industry.icon,
    products: industry.products,
    countries,
    demand: demand.level,
    demandNote: demand.note,
  };
}

/* ================= DECISION CONFIG ================= */
/* Every option carries deltas for: cost, speed, risk, satisfaction, sustainability.
   For cost and risk, LOWER values are better. For speed, satisfaction and sustainability, HIGHER is better. */

const STEPS = [
  {
    key: "suppliers",
    node: "Suppliers",
    title: "Supplier Strategy",
    concept: {
      what: "A supplier is the company that manufactures the raw materials or parts you need. You can rely on one supplier, or spread orders across several.",
      why: "Suppliers are the very first link in the chain. If they are late, understocked, or shut down, everything downstream stalls.",
      how: "The number of suppliers you use changes how cheap your materials are, and how exposed you are if one supplier lets you down.",
    },
    options: [
      {
        id: "single",
        label: "Single Supplier",
        blurb: "Work with one trusted supplier for all materials.",
        tradeoff: "You unlock better pricing through a bigger, single order, and coordination is simple. But if that one supplier has a fire, a strike, or a shipping delay, your entire production line stops.",
        deltas: { cost: -12, speed: 5, risk: 22, satisfaction: -2, sustainability: 0 },
      },
      {
        id: "multiple",
        label: "Multiple Suppliers",
        blurb: "Split orders across several suppliers in different locations.",
        tradeoff: "Losing one supplier no longer sinks the business, so your risk drops sharply. The cost is smaller order sizes (less bargaining power) and more contracts to manage.",
        deltas: { cost: 10, speed: -4, risk: -22, satisfaction: 6, sustainability: 4 },
      },
    ],
  },
  {
    key: "factory",
    node: "Factory",
    title: "Factory Location",
    concept: {
      what: "The factory is where raw materials are turned into finished products. Its location is one of the biggest decisions in a supply chain.",
      why: "Distance to your factory drives labor cost, how fast products reach customers, and how many borders, ports and customs checks your goods must cross.",
      how: "A factory close to home costs more to run but ships fast and predictably. A factory overseas is cheaper to run but adds weeks of transit and more places for something to go wrong.",
    },
    options: [
      {
        id: "domestic",
        label: "Domestic",
        blurb: "Build in the same country you sell in.",
        tradeoff: "Labor and land cost more, which raises your unit cost. In exchange you get short, predictable lead times, fewer customs delays, and a lower carbon footprint from transport.",
        deltas: { cost: 16, speed: 20, risk: -12, satisfaction: 10, sustainability: 12 },
      },
      {
        id: "nearshore",
        label: "Nearshore",
        blurb: "Build in a neighboring country.",
        tradeoff: "A middle ground: moderate labor savings, a shorter shipping distance than going overseas, and a manageable amount of border paperwork.",
        deltas: { cost: 4, speed: 8, risk: -4, satisfaction: 4, sustainability: 4 },
      },
      {

const METRICS = [
  { key: "cost", label: "Cost", goodDirection: "low", unit: "" },
  { key: "speed", label: "Delivery Speed", goodDirection: "high", unit: "" },
  { key: "risk", label: "Risk", goodDirection: "low", unit: "" },
  { key: "satisfaction", label: "Customer Satisfaction", goodDirection: "high", unit: "" },
  { key: "sustainability", label: "Sustainability", goodDirection: "high", unit: "" },
];

function clamp(v) {
  return Math.max(0, Math.min(100, v));
}

function baseMetricsForCompany(company) {
  const base = { cost: 50, speed: 50, risk: 50, satisfaction: 50, sustainability: 50 };
  if (!company) return base;
  if (company.demand === "Explosive") {
    base.risk += 8;
    base.satisfaction -= 5;
  } else if (company.demand === "Seasonal") {
    base.risk += 4;
  } else {
    base.satisfaction += 3;
  }
  if (company.countries.length >= 4) {
    base.sustainability -= 5;
    base.cost += 4;
  }
  Object.keys(base).forEach((k) => (base[k] = clamp(base[k])));
  return base;
}

function goodness(metricKey, value) {
  const m = METRICS.find((x) => x.key === metricKey);
  return m.goodDirection === "low" ? 100 - value : value;
}

function overallScore(metrics) {
  const total = METRICS.reduce((sum, m) => sum + goodness(m.key, metrics[m.key]), 0);
  return Math.round(total / METRICS.length);
}

function ScoreGauge({ score }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    let raf;
    const start = performance.now();
    const duration = 1200;
    function tick(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplay(Math.round(eased * score));
      if (t < 1) raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [score]);

  const radius = 84;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference * (1 - display / 100);
  let tone = "warn";
  if (score >= 70) tone = "good";
  else if (score < 45) tone = "bad";

  return React.createElement(
    "div",
    { className: "gauge" },
    React.createElement(
      "svg",
      { viewBox: "0 0 200 200", className: "gauge__svg" },
      React.createElement("circle", { cx: 100, cy: 100, r: radius, className: "gauge__track" }),
      React.createElement("circle", {
        cx: 100,
        cy: 100,
        r: radius,
        className: "gauge__fill gauge__fill--" + tone,
        style: {
          strokeDasharray: circumference,
          strokeDashoffset: offset,
        },
      }),
    ),
    React.createElement(
      "div",
      { className: "gauge__label" },
      React.createElement("div", { className: "gauge__score" }, display),
      React.createElement("div", { className: "gauge__of" }, "out of 100"),

  );
}

function generateInsights(company, decisions, metrics) {
  const goodnessList = METRICS.map((m) => ({
    key: m.key,
    label: m.label,
    good: goodness(m.key, metrics[m.key]),
  })).sort((a, b) => b.good - a.good);

  const strengths = goodnessList.slice(0, 2);
  const weaknesses = goodnessList.slice(-2).reverse();

  // Biggest risk: contextual narrative based on the actual combination of decisions.
  let biggestRisk = "";
  const single = decisions.suppliers === "single";
  const offshore = decisions.factory === "offshore";
  const centralized = decisions.warehouse === "centralized";
  const lowInventory = decisions.inventory === "low";
  const slowShip = decisions.transport === "sea";

  if (single && offshore) {
    biggestRisk =
      "Your entire product line depends on one supplier on the other side of the world. A single factory fire, port closure, or shipping delay could halt production for weeks with no backup source.";
  } else if (single && lowInventory) {
    biggestRisk =
      "You are running lean inventory on top of a single supplier. There is no buffer of stock and no backup source, so any hiccup upstream shows up on shelves almost immediately.";
  } else if (centralized && slowShip) {
    biggestRisk =
      "One central warehouse fed by slow ocean freight means distant customers wait the longest, and any disruption at that single warehouse stalls deliveries everywhere at once.";
  } else if (offshore && lowInventory) {
    biggestRisk =
      "Materials travel a long distance from an offshore factory, but you are holding almost no safety stock. A delay in transit has nothing to absorb it before it reaches customers.";
  } else if (weaknesses[0].key === "risk") {
    biggestRisk =
      "Risk is the weakest link in this chain. Several of your choices concentrate exposure in single points of failure rather than spreading it out.";
  } else {
    biggestRisk =
      "The biggest exposure right now is " +
      weaknesses[0].label.toLowerCase() +
      ", which trails the rest of your operation and would be the first thing to break under pressure.";
  }

  // Improvements: compare current choice to the alternative that best serves the weakest metrics.
  const weakKeys = weaknesses.map((w) => w.key);
  const improvementPool = [];

  STEPS.forEach((step) => {
    const chosenId = decisions[step.key];
    const chosen = step.options.find((o) => o.id === chosenId);
    if (!chosen) return;
    let bestAlt = null;
    let bestScore = -Infinity;
    step.options.forEach((opt) => {
      if (opt.id === chosenId) return;
      let s = 0;
      weakKeys.forEach((k) => {
        const dir = METRICS.find((m) => m.key === k).goodDirection;
        const delta = opt.deltas[k] || 0;
        s += dir === "low" ? -delta : delta;
      });
      if (s > bestScore) {
        bestScore = s;
        bestAlt = opt;
      }
    });
    if (bestAlt && bestScore > 4) {
      improvementPool.push({
        score: bestScore,
        text:
          "Switch your " +
          step.title.toLowerCase() +
          " from " +
          chosen.label +
          " to " +
          bestAlt.label +
          " to strengthen " +
          weakKeys.map((k) => METRICS.find((m) => m.key === k).label.toLowerCase()).join(" and ") +
          ".",
      });
    }
  });

  improvementPool.sort((a, b) => b.score - a.score);

  const genericTips = [
    "Track your two weakest metrics every quarter, small drifts are far cheaper to fix than a full redesign later.",
    "Build a contingency plan for your single biggest point of failure, even a rough backup plan beats none at all.",
    "Revisit this chain whenever demand shifts. A strategy tuned for steady demand can crack under a sudden spike.",
  ];

  const improvements = [];
  improvementPool.forEach((tip) => {
    if (improvements.length < 3 && !improvements.includes(tip.text)) improvements.push(tip.text);
  });
  let gi = 0;
  while (improvements.length < 3 && gi < genericTips.length) {
    improvements.push(genericTips[gi]);
    gi++;
  }

  return { strengths, weaknesses, biggestRisk, improvements: improvements.slice(0, 3) };
}

/* ============ DASHBOARD ============ */

function Dashboard({ company, decisions, metrics, onReplay }) {
  const score = overallScore(metrics);
  const insights = useMemo(() => generateInsights(company, decisions, metrics), [company, decisions, metrics]);

  let verdict = "Needs work";
  if (score >= 80) verdict = "Excellent chain";
  else if (score >= 65) verdict = "Solid chain";
  else if (score >= 50) verdict = "Workable, with gaps";

  return React.createElement(
    "div",
    { className: "screen dashboard" },

    ),

      { className: "card" },

/* ============ ROOT APP ============ */

function App() {
  const [screen, setScreen] = useState("welcome");
  const [company, setCompany] = useState(null);
  const [stepIndex, setStepIndex] = useState(0);
  const [decisions, setDecisions] = useState({});
  const [metrics, setMetrics] = useState(baseMetricsForCompany(null));

  function startCompany() {
    const c = generateCompany();
    setCompany(c);
    setMetrics(baseMetricsForCompany(c));
    setScreen("company");
  }

  function startBuilding() {
    setStepIndex(0);
    setDecisions({});
    setScreen("decision");
  }

  function handleConfirm(stepKey, option) {
    const next = { ...decisions, [stepKey]: option.id, [stepKey + "Label"]: option.label };
    setDecisions(next);
    setMetrics((prev) => {
      const updated = { ...prev };
      Object.keys(option.deltas).forEach((k) => {
        updated[k] = clamp(prev[k] + option.deltas[k]);
      });
      return updated;
    });
    if (stepIndex + 1 >= STEPS.length) {
      setScreen("dashboard");
    } else {
      setStepIndex(stepIndex + 1);
    }
  }

  function replay() {
    const c = generateCompany();
    setCompany(c);
    setMetrics(baseMetricsForCompany(c));
    setDecisions({});
    setStepIndex(0);
    setScreen("company");
  }

  const showChrome = screen === "decision" || screen === "dashboard";

  return React.createElement(
    "div",
    { className: "app" },
    React.createElement(
      "header",
      { className: "app-header" },
      React.createElement(
        "div",
        { className: "app-header__brand" },
        React.createElement("div", { className: "app-header__mark" }, React.createElement(Icon, { name: "suppliers", size: 20 })),
        React.createElement("span", null, "Supply Chain Builder"),
      ),
      showChrome && React.createElement(MetricsStrip, { metrics }),
    ),
    React.createElement(
      "main",
      { className: "app-main" },
      screen === "welcome" && React.createElement(WelcomeScreen, { onStart: startCompany }),
      screen === "company" && company && React.createElement(CompanyScreen, { company, onContinue: startBuilding }),
      screen === "decision" &&
        React.createElement(DecisionScreen, {
          key: STEPS[stepIndex].key,
          step: STEPS[stepIndex],
          stepIndex,
          totalSteps: STEPS.length,
          decisions,
          onConfirm: handleConfirm,
        }),
      screen === "dashboard" &&
        React.createElement(Dashboard, { company, decisions, metrics, onReplay: replay }),
    ),
    React.createElement(
      "footer",
      { className: "app-footer" },
      "Supply Chain Builder \u2014 a hands-on way to learn how products actually reach you.",
    ),
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
