<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Compass — Tech Company</title>
<style>
  :root{
    --bg-deep:#0a0e16;
    --bg-panel:rgba(255,255,255,0.045);
    --bg-panel-strong:rgba(255,255,255,0.075);
    --border-soft:rgba(255,255,255,0.09);
    --gold:#f4b942;
    --gold-dim:rgba(244,185,66,0.35);
    --text-1:#eef1f7;
    --text-2:#a6adc0;
    --text-3:#6b7285;
    --good:#4ade80;
    --bad:#f87171;
    --fd:#8b5cf6; --bd:#3b82f6; --qa:#f59e0b; --pm:#ec4899;
    --ux:#14b8a6; --cs:#22c55e; --em:#fb923c; --dv:#06b6d4;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1100px 700px at 15% -10%, rgba(244,185,66,0.09), transparent 60%),
      radial-gradient(900px 600px at 110% 10%, rgba(59,130,246,0.10), transparent 55%),
      var(--bg-deep);
    color:var(--text-1);
    font-family:var(--sans);
    min-height:100vh;
    padding:28px 16px 60px;
  }
  .shell{max-width:980px;margin:0 auto;}
  ::selection{background:var(--gold-dim);}

  /* ---------- header ---------- */
  header.top{text-align:center;margin-bottom:22px;}
  .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold);opacity:.85;margin-bottom:6px;
  }
  h1.brand{
    font-size:clamp(32px,5vw,46px);margin:0;font-weight:800;letter-spacing:-0.02em;
    background:linear-gradient(120deg,#fff,#c9d3e8 45%,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .subtitle{color:var(--text-2);margin-top:6px;font-size:15px;}

  .progress-wrap{max-width:520px;margin:22px auto 0;}
  .progress-label{
    display:flex;justify-content:space-between;font-family:var(--mono);
    font-size:11px;color:var(--text-3);margin-bottom:6px;letter-spacing:.04em;
  }
  .progress-track{height:6px;border-radius:99px;background:rgba(255,255,255,0.07);overflow:hidden;}
  .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--dv),var(--gold));
    transition:width .5s cubic-bezier(.4,0,.2,1);}

  /* ---------- generic panel ---------- */
  .panel{
    background:var(--bg-panel);
    border:1px solid var(--border-soft);
    border-radius:22px;
    padding:32px;
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    animation:fadeUp .5s ease both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  .btn{
    font-family:var(--sans);font-weight:600;font-size:14.5px;
    padding:13px 26px;border-radius:12px;border:1px solid var(--border-soft);
    background:var(--bg-panel-strong);color:var(--text-1);cursor:pointer;
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,0.22);}
  .btn:active{transform:translateY(0px) scale(.98);}
  .btn.primary{
    background:linear-gradient(135deg,var(--gold),#e8a52f);color:#241703;border:none;
    box-shadow:0 8px 24px -8px rgba(244,185,66,0.55);
  }
  .btn.primary:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}
  .btn.primary:hover:not(:disabled){transform:translateY(-2px);}
  .btn-row{display:flex;justify-content:center;gap:12px;margin-top:26px;}

  /* ---------- intro / stage intro ---------- */
  .intro-icon{font-size:52px;margin-bottom:6px;}
  .intro-title{font-size:26px;font-weight:800;margin:6px 0 10px;letter-spacing:-0.01em;}
  .intro-body{color:var(--text-2);line-height:1.65;font-size:15px;max-width:620px;margin:0 auto;}
  .stage-tag{
    display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-dim);
    padding:5px 12px;border-radius:99px;margin-bottom:14px;
  }
  .role-legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:22px;}
  .legend-chip{
    font-family:var(--mono);font-size:11.5px;padding:6px 11px;border-radius:99px;
    border:1px solid var(--border-soft);display:flex;align-items:center;gap:6px;color:var(--text-2);
  }
  .legend-dot{width:8px;height:8px;border-radius:50%;}

  /* ---------- ticket card ---------- */
  .ticket{
    background:linear-gradient(155deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
    border:1px dashed rgba(255,255,255,0.22);
    border-radius:16px;padding:20px 22px;position:relative;text-align:left;
  }
  .ticket::before,.ticket::after{
    content:"";position:absolute;width:16px;height:16px;background:var(--bg-deep);
    border-radius:50%;top:50%;transform:translateY(-50%);
  }
  .ticket::before{left:-9px;} .ticket::after{right:-9px;}
  .ticket-id{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.08em;margin-bottom:8px;}
  .ticket-title{font-size:18px;font-weight:700;margin:0 0 8px;}
  .ticket-desc{color:var(--text-2);font-size:14px;line-height:1.55;}

  /* ---------- circular selector (stage 1 & 3) ---------- */
  .compass-wrap{
    position:relative;width:min(560px,94vw);aspect-ratio:1;margin:30px auto 6px;
  }
  .compass-ring{
    position:absolute;inset:6%;border-radius:50%;
    border:1px solid rgba(255,255,255,0.06);
  }
  .compass-ring.r2{inset:16%;}
  .compass-hub{
    position:absolute;inset:26%;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,255,255,0.09), rgba(255,255,255,0.02));
    border:1px solid var(--border-soft);
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    padding:16px;text-align:center;cursor:pointer;transition:box-shadow .2s ease, border-color .2s ease;
  }
  .compass-hub.dropready{border-color:var(--gold);box-shadow:0 0 0 6px var(--gold-dim);}
  .compass-hub .hub-hint{font-family:var(--mono);font-size:10.5px;color:var(--text-3);letter-spacing:.05em;text-transform:uppercase;}
  .compass-hub .hub-slot{margin-top:8px;font-weight:700;font-size:14px;}
  .compass-needle{
    position:absolute;left:50%;top:50%;width:2px;height:0%;
    background:linear-gradient(to top, transparent, var(--gold));
    transform-origin:bottom center;transform:translate(-50%,-100%) rotate(0deg);
    transition:height .6s cubic-bezier(.34,1.56,.64,1), transform .6s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none;
  }
  .role-node{
    position:absolute;width:106px;transform:translate(-50%,-50%);
    text-align:center;cursor:grab;user-select:none;
  }
  .role-node .chip{
    background:var(--bg-panel-strong);border:1px solid var(--border-soft);border-radius:14px;
    padding:10px 6px 9px;transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .role-node .chip .ic{font-size:22px;display:block;}
  .role-node .chip .nm{font-size:11px;font-weight:600;margin-top:4px;line-height:1.25;color:var(--text-1);}
  .role-node.selected .chip{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);transform:translateY(-3px);}
  .role-node:hover .chip{transform:translateY(-3px);}
  .role-node.used .chip{opacity:.3;}
  .role-node.correct-owner .chip{border-color:var(--good);box-shadow:0 0 0 3px rgba(74,222,128,.3);}
  .role-node.assist-role .chip{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);}
  .role-node.wrong-pick .chip{border-color:var(--bad);box-shadow:0 0 0 3px rgba(248,113,113,.28);}

  /* ---------- reveal panel ---------- */
  .reveal{
    margin-top:22px;padding:18px 20px;border-radius:16px;
    background:rgba(255,255,255,0.04);border:1px solid var(--border-soft);text-align:left;
    animation:fadeUp .4s ease both;
  }
  .reveal-row{display:flex;gap:10px;margin-bottom:8px;font-size:14px;line-height:1.55;}
  .reveal-row b{color:var(--text-1);white-space:nowrap;}
  .reveal-row span{color:var(--text-2);}
  .assist-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
  .assist-tag{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:99px;border:1px solid var(--border-soft);color:var(--text-2);}

  /* ---------- stage 2 pipeline ---------- */
  .pipeline{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:26px 0 8px;}
  .slot{
    width:118px;min-height:96px;border-radius:14px;border:1.5px dashed rgba(255,255,255,0.18);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    background:rgba(255,255,255,0.02);position:relative;transition:border-color .18s ease, background .18s ease;
    padding:8px;text-align:center;
  }
  .slot .slot-num{position:absolute;top:6px;left:8px;font-family:var(--mono);font-size:10px;color:var(--text-3);}
  .slot.filled{border-style:solid;background:var(--bg-panel-strong);}
  .slot.dropready{border-color:var(--gold);background:rgba(244,185,66,0.08);}
  .slot .placeholder{color:var(--text-3);font-size:11px;font-family:var(--mono);}
  .slot .ic{font-size:22px;}
  .slot .nm{font-size:10.5px;font-weight:600;margin-top:2px;}
  .arrow-sep{align-self:center;color:var(--text-3);font-size:18px;}

  .bank{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border-soft);}
  .bank .role-chip{
    width:92px;padding:10px 4px 8px;border-radius:12px;background:var(--bg-panel-strong);
    border:1px solid var(--border-soft);text-align:center;cursor:grab;user-select:none;
    transition:transform .15s ease, opacity .15s ease, border-color .15s ease;
  }
  .bank .role-chip:hover{transform:translateY(-2px);}
  .bank .role-chip.selected{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim);}
  .bank .role-chip.used{opacity:.28;pointer-events:none;}
  .bank .role-chip .ic{font-size:20px;display:block;}
  .bank .role-chip .nm{font-size:10.5px;font-weight:600;margin-top:3px;}

  .hint-line{text-align:center;color:var(--text-3);font-family:var(--mono);font-size:11.5px;margin-top:6px;letter-spacing:.02em;}

  .route-anim{display:flex;gap:10px;justify-content:center;margin:22px 0;flex-wrap:wrap;}
  .route-node{
    width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:24px;background:var(--bg-panel-strong);border:1px solid var(--border-soft);opacity:.25;
    transition:opacity .3s ease, transform .3s ease, box-shadow .3s ease;
  }
  .route-node.lit{opacity:1;transform:scale(1.08);box-shadow:0 0 0 4px var(--gold-dim);}
  .route-arrow{align-self:center;color:var(--text-3);}

  /* ---------- stage 3 selection state ---------- */
  .select-status{display:flex;justify-content:center;gap:8px;margin:18px 0 4px;flex-wrap:wrap;}
  .status-pill{
    font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:99px;
    border:1px solid var(--border-soft);color:var(--text-2);
  }
  .status-pill.primary-set{border-color:var(--gold);color:var(--gold);}

  /* ---------- results ---------- */
  .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px;}
  @media(max-width:560px){.score-grid{grid-template-columns:1fr;}}
  .score-card{
    background:rgba(255,255,255,0.035);border:1px solid var(--border-soft);border-radius:14px;
    padding:14px 16px;
  }
  .score-card .lbl{font-family:var(--mono);font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;}
  .score-card .bar-track{height:8px;border-radius:99px;background:rgba(255,255,255,0.07);margin-top:8px;overflow:hidden;}
  .score-card .bar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1);}
  .score-card .pct{font-family:var(--mono);font-size:13px;margin-top:6px;color:var(--text-1);}

  .radar-wrap{display:flex;justify-content:center;margin:26px 0 6px;}

  .reflection{margin-top:26px;text-align:left;}
  .reflect-item{
    display:flex;gap:12px;padding:14px 0;border-top:1px solid var(--border-soft);
  }
  .reflect-item:first-child{border-top:none;}
  .reflect-ic{font-size:20px;flex-shrink:0;}
  .reflect-txt b{display:block;font-size:13.5px;margin-bottom:3px;color:var(--text-1);}
  .reflect-txt span{color:var(--text-2);font-size:14px;line-height:1.6;}

  .insight-box{
    margin-top:22px;padding:18px 20px;border-radius:14px;
    background:linear-gradient(135deg, rgba(244,185,66,0.10), rgba(244,185,66,0.02));
    border:1px solid var(--gold-dim);font-size:14.5px;line-height:1.6;font-style:italic;color:#f2e4bf;
  }

  /* confetti */
  .confetti-piece{
    position:fixed;top:-10px;width:8px;height:14px;pointer-events:none;z-index:50;
    animation:fall linear forwards;
  }
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.4;}}

  footer.foot{text-align:center;margin-top:34px;color:var(--text-3);font-family:var(--mono);font-size:11px;}
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div class="eyebrow">Task Compass · Tech Company Simulation</div>
    <h1 class="brand">Task Compass</h1>
    <div class="subtitle">Learn how work flows through real organizations.</div>
    <div class="progress-wrap" id="progressWrap" style="display:none;">
      <div class="progress-label"><span id="progLabel">Stage 1 · Question 1 of 3</span><span id="progPct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    </div>
  </header>
  <div id="app"></div>
  <footer class="foot">TASK COMPASS — ORGANIZATIONAL FLOW SIMULATOR</footer>
</div>

<script>
(function(){
"use strict";

/* ================= DATA ================= */
var ROLES = [
  {id:"fd", name:"Frontend Developer", icon:"🖥️", color:"var(--fd)"},
  {id:"bd", name:"Backend Developer", icon:"⚙️", color:"var(--bd)"},
  {id:"qa", name:"QA Engineer", icon:"🔍", color:"var(--qa)"},
  {id:"pm", name:"Product Manager", icon:"📋", color:"var(--pm)"},
  {id:"ux", name:"UX Designer", icon:"🎨", color:"var(--ux)"},
  {id:"cs", name:"Customer Support", icon:"💬", color:"var(--cs)"},
  {id:"em", name:"Engineering Manager", icon:"🧭", color:"var(--em)"},
  {id:"dv", name:"DevOps Engineer", icon:"🚀", color:"var(--dv)"}
];
function roleById(id){ for(var i=0;i<ROLES.length;i++){ if(ROLES[i].id===id) return ROLES[i]; } return null; }

var STAGE1_POOL = [
  {id:"t1", ticket:"TC-1042", title:"Payments fail only on iPhones",
   desc:"A customer reports that payments fail only on iPhones, but work fine on Android and desktop.",
   owner:"fd", assist:["qa","bd","cs"],
   reason:"Symptoms isolated to a single platform usually trace back to how the interface renders or behaves in that environment — that's Frontend territory. QA reproduces it across devices, Backend confirms the payment API isn't the real cause, and Support gathers details from the customer."},
  {id:"t2", ticket:"TC-1043", title:"Homepage is slow for European users",
   desc:"The homepage takes 8 seconds to load for users in Europe, while US users see it load instantly.",
   owner:"dv", assist:["bd","fd","em"],
   reason:"A regional performance gap like this usually comes down to server location, caching, or delivery infrastructure — DevOps territory. Backend and Frontend often assist by trimming payloads and query times, and an Engineering Manager may weigh in on infrastructure budget."},
  {id:"t3", ticket:"TC-1044", title:"Checkout validation can be bypassed",
   desc:"A user found a way to bypass checkout validation and submit an order with an empty cart.",
   owner:"bd", assist:["qa","fd","pm"],
   reason:"Client-side checks can be edited or skipped by anyone with developer tools open, so the real safeguard has to live on the server — a Backend responsibility. QA verifies the fix actually closes the gap, Frontend may tighten the UI too, and Product weighs the impact."},
  {id:"t4", ticket:"TC-1045", title:"New onboarding flow confuses users",
   desc:"Users say the new onboarding flow is confusing, and many drop off before finishing.",
   owner:"ux", assist:["pm","fd","cs"],
   reason:"When people get lost inside a designed flow rather than hitting a technical error, the fix usually starts with rethinking the flow itself — core UX work. Product and Frontend help ship the revision, and Support surfaces what users are actually struggling with."},
  {id:"t5", ticket:"TC-1046", title:"Support is flooded with password reset tickets",
   desc:"Support is fielding roughly 50 tickets a day asking how to reset a password.",
   owner:"pm", assist:["ux","fd","cs"],
   reason:"A recurring support burden like this is a signal to fix the underlying product experience, which is Product's call to prioritize. UX redesigns the reset flow, Frontend builds it, and Support keeps handling tickets until the fix ships."},
  {id:"t6", ticket:"TC-1047", title:"A competitor launches a cheaper alternative",
   desc:"A competitor just launched a cheaper version of your core feature.",
   owner:"pm", assist:["em","ux","cs"],
   reason:"Deciding how to respond to competitive pressure — repricing, differentiating, or doubling down on quality — is a product strategy call. Engineering Manager weighs feasibility, UX considers what would feel worth the price, and Support shares what customers are saying."},
  {id:"t7", ticket:"TC-1048", title:"App crashes with large carts",
   desc:"The app crashes for users who add more than 500 items to their cart.",
   owner:"bd", assist:["qa","dv","fd"],
   reason:"A crash tied to data volume rather than a specific screen usually means the server is choking on a large request — a Backend problem. QA reproduces it at scale, DevOps checks infrastructure limits, and Frontend confirms the UI handles large lists once fixed."},
  {id:"t8", ticket:"TC-1049", title:"QA finds a session security vulnerability",
   desc:"QA found a security vulnerability in how user sessions are handled.",
   owner:"bd", assist:["dv","em","qa"],
   reason:"Session handling lives in server logic, so closing the hole is Backend's job. DevOps helps assess exposure and rotate credentials, Engineering Manager coordinates urgency, and QA verifies the patch holds."},
  {id:"t9", ticket:"TC-1050", title:"New icons don't match the design system",
   desc:"The design team submitted new icons, but they don't match the existing icon grid size used across the app.",
   owner:"ux", assist:["fd","qa","pm"],
   reason:"Keeping visual elements consistent with the design system is UX territory, even though the mismatch shows up in code. Frontend implements the correction, QA checks it across screens, and Product decides if it's worth delaying a release for."}
];

var STAGE2_POOL = [
  {id:"r1", title:"A customer emails support about a bug in the mobile app.",
   order:["cs","qa","bd","pm"],
   reason:"Support is the first point of contact, so they log what the customer experienced. QA reproduces the bug to confirm it's real. Backend fixes the underlying cause. Product reviews the fix against the release plan before it ships."},
  {id:"r2", title:"Marketing requests a new pricing page before a product launch.",
   order:["pm","ux","fd","qa"],
   reason:"Product scopes what the page needs to say and do. UX shapes the layout and flow. Frontend builds it. QA checks it across devices before it goes live."},
  {id:"r3", title:"A critical production outage is reported at 2am.",
   order:["dv","bd","em","cs"],
   reason:"DevOps is paged first since it's an infrastructure and uptime issue. Backend digs into the application-level cause. Engineering Manager coordinates the response. Support keeps affected customers updated throughout."},
  {id:"r4", title:"A user requests a new feature through the app's feedback form.",
   order:["cs","pm","ux","fd","qa"],
   reason:"Support routes the request so it isn't lost. Product decides if and when it fits the roadmap. UX figures out how it should work. Frontend builds it. QA confirms it's solid before release."},
  {id:"r5", title:"QA finds a major bug two days before a planned release.",
   order:["qa","bd","em","pm"],
   reason:"QA flags the bug with enough detail to act on. Backend investigates and fixes the root cause. Engineering Manager decides whether the timeline can absorb the fix. Product communicates any changes to stakeholders."},
  {id:"r6", title:"Sales asks for a custom integration for one enterprise client.",
   order:["pm","bd","qa","em"],
   reason:"Product evaluates whether the integration fits the broader product, not just this deal. Backend builds it. QA tests it thoroughly since it's easy to miss in general testing. Engineering Manager signs off on the resourcing it took."}
];

var STAGE3_POOL = [
  {id:"c1", title:"Customer satisfaction suddenly drops.",
   primary:"cs", supporting:["pm","qa","ux"],
   reason:"Support sees the drop first and owns tracking it. Product investigates whether a recent change caused it. QA checks for a bug that might explain it. UX looks at whether a workflow change is frustrating users.",
   flow:"Support flags the trend → Product and QA investigate in parallel → UX reviews any flow changes → Support relays the fix back to affected customers."},
  {id:"c2", title:"Sales increase dramatically overnight.",
   primary:"dv", supporting:["bd","em","cs"],
   reason:"DevOps owns making sure infrastructure can handle new load without falling over. Backend helps identify bottlenecks under real traffic. Engineering Manager prioritizes urgent scaling work. Support monitors for user-facing slowdowns.",
   flow:"DevOps monitors system load → Backend addresses bottlenecks found → Engineering Manager reprioritizes the team if needed → Support keeps customers informed of any degradation."},
  {id:"c3", title:"Negative reviews appear online about app reliability.",
   primary:"em", supporting:["qa","bd","pm"],
   reason:"Engineering Manager owns understanding the pattern and coordinating a response. QA investigates which reported issues are reproducible. Backend addresses technical root causes. Product decides how to communicate the fix publicly.",
   flow:"Engineering Manager reviews the pattern → QA reproduces common issues → Backend fixes root causes → Product shares an update on what's improved."},
  {id:"c4", title:"A major feature is delayed by three weeks.",
   primary:"em", supporting:["pm","bd","fd"],
   reason:"Engineering Manager owns assessing why the delay happened and what recovery takes. Product decides what to communicate and whether scope should shrink. Backend and Frontend report realistic timelines for what's left.",
   flow:"Engineering Manager audits remaining work → Backend and Frontend give updated estimates → Product adjusts scope or messaging → stakeholders receive a revised plan."},
  {id:"c5", title:"A high-profile client threatens to churn over a bug.",
   primary:"pm", supporting:["bd","cs","em"],
   reason:"Product owns managing the relationship and deciding how urgently to respond. Backend fixes the underlying bug. Support communicates directly with the client. Engineering Manager may reprioritize the team to move fast.",
   flow:"Product assesses the business risk → Backend fixes the bug on an expedited track → Support keeps the client updated → Engineering Manager clears space on the schedule."}
];

/* ================= STATE ================= */
var state = {
  screen:"intro",
  s1:{tasks:[], idx:0, answers:[], picked:null, revealed:false},
  s2:{tasks:[], idx:0, answers:[], slots:[], revealed:false, animating:false},
  s3:{tasks:[], idx:0, answers:[], primary:null, supporting:[], revealed:false},
  selectedChip:null
};

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}
function pickN(pool,n){ return shuffle(pool).slice(0,n); }

function initGame(){
  state.s1.tasks = pickN(STAGE1_POOL,3);
  state.s2.tasks = pickN(STAGE2_POOL,3);
  state.s3.tasks = pickN(STAGE3_POOL,3);
}

/* ================= HELPERS ================= */
function esc(s){ return String(s); }
function totalStepIndex(){
  if(state.screen==="s1") return state.s1.idx;
  if(state.screen==="s2") return 3+state.s2.idx;
  if(state.screen==="s3") return 6+state.s3.idx;

}
function updateProgress(){
  var wrap = document.getElementById("progressWrap");
  var onQuestion = state.screen==="s1"||state.screen==="s2"||state.screen==="s3";
  wrap.style.display = (onQuestion||state.screen==="results") ? "block":"none";
  if(!onQuestion && state.screen!=="results") return;
  var stageNum = state.screen==="s1"?1:state.screen==="s2"?2:3;
  var qNum = state.screen==="s1"?state.s1.idx+1:state.screen==="s2"?state.s2.idx+1:state.s3.idx+1;
  var pct = Math.round((totalStepIndex()/9)*100);
  if(state.screen==="results"){ pct=100; }
  document.getElementById("progLabel").textContent = state.screen==="results" ? "Simulation complete" : ("Stage "+stageNum+" · Question "+qNum+" of 3");
  document.getElementById("progPct").textContent = pct+"%";

function legendHTML(){

/* circular position for N nodes around a circle, index i */
function circlePos(i,n){
  var angle = (-90 + (360/n)*i) * Math.PI/180;
  var r = 40; // percent
  var x = 50 + r*Math.cos(angle);
  var y = 50 + r*Math.sin(angle);
  return {x:x,y:y,deg:(-90+(360/n)*i)};
}

/* ================= RESULTS ================= */
function computeScores(){
  var s1 = state.s1.answers, s2 = state.s2.answers, s3 = state.s3.answers;

  var ownership = s1.reduce(function(sum,a){ return sum + (a.correct?100:(a.assist?50:0)); },0) / s1.length;
  var workflow = s2.reduce(function(sum,a){ return sum + a.fraction*100; },0) / s2.length;
  var collaboration = s3.reduce(function(sum,a){
    var primaryPts = a.primaryCorrect ? 50 : 0;
    var overlap = a.supportOverlap * 50;
    return sum + primaryPts + overlap;
  },0) / s3.length;
  var delegation = s3.reduce(function(sum,a){ return sum + (Math.min(a.total,4)/4)*100; },0) / s3.length;

  return {
    "Ownership": Math.round(ownership),
    "Delegation": Math.round(delegation),
    "Collaboration": Math.round(collaboration),
    "Workflow Thinking": Math.round(workflow)
  };
}

function radarSVG(scores){
  var order = ["Ownership","Workflow Thinking","Collaboration","Delegation"]; // N, E, S, W
  var angles = [-90,0,90,180];
  var cx=120, cy=120, maxR=88;
  function pt(ang, r){
    var rad = ang*Math.PI/180;
    return {x: cx + r*Math.cos(rad), y: cy + r*Math.sin(rad)};
  }
  var rings = [0.25,0.5,0.75,1];
  var ringsHTML = "";
  rings.forEach(function(f){
    var pts = angles.map(function(a){ var p=pt(a,maxR*f); return p.x+","+p.y; }).join(" ");
    ringsHTML += '<polygon points="'+pts+'" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>';
  });
  var axesHTML = "";
  angles.forEach(function(a){
    var p = pt(a,maxR);
    axesHTML += '<line x1="'+cx+'" y1="'+cy+'" x2="'+p.x+'" y2="'+p.y+'" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>';
  });
  var dataPts = order.map(function(k,i){
    var v = scores[k]/100;
    var p = pt(angles[i], maxR*v);
    return p.x+","+p.y;
  }).join(" ");
  var labelsHTML = "";
  var labelOffsets = [{dx:0,dy:-16},{dx:20,dy:4},{dx:0,dy:24},{dx:-20,dy:4}];
  order.forEach(function(k,i){
    var p = pt(angles[i], maxR+18);
    labelsHTML += '<text x="'+(p.x+labelOffsets[i].dx*0)+'" y="'+(p.y)+'" fill="#a6adc0" font-size="10.5" font-family="ui-monospace,monospace" text-anchor="middle">'+k.toUpperCase()+'</text>';
  });
  return '<svg width="260" height="260" viewBox="0 0 240 240">' +
    ringsHTML + axesHTML +
    '<polygon points="'+dataPts+'" fill="rgba(244,185,66,0.28)" stroke="#f4b942" stroke-width="2"/>' +
    labelsHTML +
    '<circle cx="'+cx+'" cy="'+cy+'" r="2.5" fill="#f4b942"/>' +
  '</svg>';
}

function reflectionText(scores){
  var entries = Object.keys(scores).map(function(k){return {k:k,v:scores[k]};});
  entries.sort(function(a,b){return b.v-a.v;});
  var best = entries[0], worst = entries[entries.length-1];

  var understood = "You showed the strongest grasp of <b>"+best.k+"</b> — your calls in that area tracked closely with how these situations tend to play out on a real team.";

  var delegScore = scores["Delegation"];
  var overAssign = delegScore < 65
    ? "In the collaboration challenge, you often leaned on a single role to carry a situation rather than bringing others in — a common instinct, but one that can leave a team stretched thin."
    : "You generally spread responsibility across multiple roles rather than loading it onto one — that instinct tends to hold up well as problems get bigger.";

  var collabScore = scores["Collaboration"];
  var underCollab = collabScore < 65
    ? "Some of the supporting roles you'd expect to see pulled in — QA, Engineering Management, or Support depending on the situation — were sometimes left out of the picture."
    : "You picked up on most of the supporting roles a real incident like this would typically involve.";

  return {understood:understood, overAssign:overAssign, underCollab:underCollab};
}

function renderResults(){
  var scores = computeScores();
  var refl = reflectionText(scores);
  var colorMap = {"Ownership":"var(--fd)","Delegation":"var(--em)","Collaboration":"var(--cs)","Workflow Thinking":"var(--dv)"};

  var cards = Object.keys(scores).map(function(k){
    return '<div class="score-card"><div class="lbl">'+k+'</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:'+scores[k]+'%;background:'+colorMap[k]+'"></div></div>' +

  return '' +

    '<div class="stage-tag">Simulation Complete</div>' +
    '<div class="intro-icon">🏁</div>' +
    '<div class="intro-title">Here\'s how your compass points.</div>' +

    '<div class="score-grid">'+cards+'</div>' +

      '<div class="reflect-item"><div class="reflect-ic">💡</div><div class="reflect-txt"><b>What you understood well</b><span>'+refl.understood+'</span></div></div>' +
      '<div class="reflect-item"><div class="reflect-ic">⚖️</div><div class="reflect-txt"><b>Where you tended to over-assign responsibility</b><span>'+refl.overAssign+'</span></div></div>' +
      '<div class="reflect-item"><div class="reflect-ic">🧩</div><div class="reflect-txt"><b>Where collaboration was easy to underestimate</b><span>'+refl.underCollab+'</span></div></div>' +
    '</div>' +

/* ================= SOUND (optional, silent-safe) ================= */
var audioCtx = null;
function beep(freq, dur){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = "sine"; o.frequency.value = freq;
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  }catch(e){ /* audio unavailable, ignore */ }
}

function confettiBurst(){
  var colors = ["#f4b942","#8b5cf6","#3b82f6","#22c55e","#ec4899","#06b6d4"];

    el.style.opacity = String(0.6+Math.random()*0.4);

}

/* ================= EVENT BINDING ================= */
function bindEvents(){
  var app = document.getElementById("app");

  var startBtn = document.getElementById("startBtn");
  if(startBtn) startBtn.onclick = function(){ state.screen="s1intro"; render(); };

  var gotoBtn = app.querySelector("[data-goto]");
  if(gotoBtn) gotoBtn.onclick = function(){ state.screen = gotoBtn.getAttribute("data-goto"); render(); };

  if(state.screen==="s1") bindStage1();
  if(state.screen==="s2") bindStage2();
  if(state.screen==="s3") bindStage3();

  var restartBtn = document.getElementById("restartBtn");
  if(restartBtn) restartBtn.onclick = function(){
    state = {screen:"intro", s1:{tasks:[],idx:0,answers:[],picked:null,revealed:false},
      s2:{tasks:[],idx:0,answers:[],slots:[],revealed:false,animating:false},
      s3:{tasks:[],idx:0,answers:[],primary:null,supporting:[],revealed:false}, selectedChip:null};
    initGame();
    render();
  };
}

/* ---- Stage 1 binding ---- */
function bindStage1(){
  var s = state.s1;
  var hub = document.getElementById("hubTarget");
  var nodes = document.querySelectorAll('.role-node[data-selectable="1"]');

  nodes.forEach(function(node){
    var rid = node.getAttribute("data-role");
    node.addEventListener("dragstart", function(e){ e.dataTransfer.setData("text/plain", rid); });
    node.addEventListener("click", function(){
      state.selectedChip = rid;
      s.picked = rid;
      render();
    });
  });

  if(hub && !s.revealed){
    hub.addEventListener("dragover", function(e){ e.preventDefault(); hub.classList.add("dropready"); });
    hub.addEventListener("dragleave", function(){ hub.classList.remove("dropready"); });
    hub.addEventListener("drop", function(e){
      e.preventDefault(); hub.classList.remove("dropready");
      var rid = e.dataTransfer.getData("text/plain");
      if(rid){ s.picked = rid; render(); }
    });
    hub.addEventListener("click", function(){
      if(state.selectedChip){ s.picked = state.selectedChip; render(); }
    });
  }

  var submitBtn = document.getElementById("submitBtn");
  if(submitBtn) submitBtn.onclick = function(){
    var task = s.tasks[s.idx];
    var correct = s.picked===task.owner;
    var assist = task.assist.indexOf(s.picked)!==-1;
    s.answers.push({taskId:task.id, chosen:s.picked, correct:correct, assist:assist});
    s.revealed = true;
    beep(correct?660:280, 0.18);
    render();
  };

  var nextBtn = document.getElementById("nextBtn");
  if(nextBtn) nextBtn.onclick = function(){
    if(s.idx<2){ s.idx++; s.picked=null; s.revealed=false; state.selectedChip=null; render(); }
    else { state.screen="s2intro"; render(); }
  };
}

/* ---- Stage 2 binding ---- */
function bindStage2(){
  var s = state.s2;
  var bankChips = document.querySelectorAll('.bank .role-chip:not(.used)');
  var slots = document.querySelectorAll('.slot');

  function placeInSlot(slotIndex, rid){
    if(s.slots[slotIndex]) return;
    if(s.slots.indexOf(rid)!==-1) return;
    s.slots[slotIndex] = rid;
    state.selectedChip = null;
    render();
  }

  bankChips.forEach(function(chip){
    var rid = chip.getAttribute("data-role");
    chip.addEventListener("dragstart", function(e){ e.dataTransfer.setData("text/plain", rid); });
    chip.addEventListener("click", function(){
      state.selectedChip = (state.selectedChip===rid) ? null : rid;
      render();
    });
  });

  slots.forEach(function(slotEl){
    var idx = parseInt(slotEl.getAttribute("data-slot"),10);
    slotEl.addEventListener("dragover", function(e){ e.preventDefault(); if(!s.slots[idx]) slotEl.classList.add("dropready"); });
    slotEl.addEventListener("dragleave", function(){ slotEl.classList.remove("dropready"); });
    slotEl.addEventListener("drop", function(e){
      e.preventDefault(); slotEl.classList.remove("dropready");
      var rid = e.dataTransfer.getData("text/plain");
      if(rid) placeInSlot(idx, rid);
    });
    slotEl.addEventListener("click", function(){
      if(s.slots[idx]){ s.slots[idx] = null; render(); return; }
      if(state.selectedChip) placeInSlot(idx, state.selectedChip);
    });
  });

  var submitRouteBtn = document.getElementById("submitRouteBtn");
  if(submitRouteBtn) submitRouteBtn.onclick = function(){
    var task = s.tasks[s.idx];
    var correctCount = 0;
    for(var i=0;i<task.order.length;i++){ if(s.slots[i]===task.order[i]) correctCount++; }
    var fraction = correctCount/task.order.length;
    s.answers.push({taskId:task.id, given:s.slots.slice(), fraction:fraction});
    s.animating = true;
    render();
    beep(fraction===1?660:420, 0.16);
    animateRoute(task.order, 0);
  };

  var nextBtn = document.getElementById("nextBtn");
  if(nextBtn) nextBtn.onclick = function(){
    if(s.idx<2){ s.idx++; s.slots=[]; s.revealed=false; s.animating=false; state.selectedChip=null; render(); }
    else { state.screen="s3intro"; render(); }
  };
}

function animateRoute(order, i){
  var anim = document.getElementById("routeAnim");
  if(!anim) return;
  var nodeEls = anim.querySelectorAll(".route-node");
  if(i>=order.length){
    state.s2.animating = false;
    state.s2.revealed = true;
    render();
    return;
  }
  if(nodeEls[i]) nodeEls[i].classList.add("lit");
  setTimeout(function(){ animateRoute(order, i+1); }, 260);
}

/* ---- Stage 3 binding ---- */
function bindStage3(){
  var s = state.s3;
  var hub = document.getElementById("hubTarget3");
  var nodes = document.querySelectorAll('.role-node[data-selectable="1"]');

  function toggleSupport(rid){
    if(s.primary===rid){ return; }
    var i = s.supporting.indexOf(rid);
    if(i!==-1){ s.supporting.splice(i,1); }
    else {
      if(s.supporting.length + (s.primary?1:0) >= 4) return;
      s.supporting.push(rid);
    }
    render();
  }

  nodes.forEach(function(node){
    var rid = node.getAttribute("data-role");
    node.addEventListener("dragstart", function(e){ e.dataTransfer.setData("text/plain", rid); });
    node.addEventListener("click", function(){ toggleSupport(rid); });
  });

  if(hub && !s.revealed){
    hub.addEventListener("dragover", function(e){ e.preventDefault(); hub.classList.add("dropready"); });
    hub.addEventListener("dragleave", function(){ hub.classList.remove("dropready"); });
    hub.addEventListener("drop", function(e){
      e.preventDefault(); hub.classList.remove("dropready");
      var rid = e.dataTransfer.getData("text/plain");
      if(rid){
        var i = s.supporting.indexOf(rid);
        if(i!==-1) s.supporting.splice(i,1);
        s.primary = rid;
        render();
      }
    });
    hub.addEventListener("click", function(){
      if(state.selectedChip){
        var rid = state.selectedChip;
        var i = s.supporting.indexOf(rid);
        if(i!==-1) s.supporting.splice(i,1);
        s.primary = rid;
        state.selectedChip = null;
        render();
      }
    });
  }

  var submitBtn = document.getElementById("submitCollabBtn");
  if(submitBtn) submitBtn.onclick = function(){
    var task = s.tasks[s.idx];
    var primaryCorrect = s.primary===task.primary;
    var chosenSupport = s.supporting.slice();
    var overlapCount = chosenSupport.filter(function(id){ return task.supporting.indexOf(id)!==-1; }).length;
    var supportOverlap = task.supporting.length ? overlapCount/task.supporting.length : 0;
    var total = (s.primary?1:0) + s.supporting.length;
    s.answers.push({taskId:task.id, primaryCorrect:primaryCorrect, supportOverlap:supportOverlap, total:total});
    s.revealed = true;
    beep(primaryCorrect?660:380, 0.18);
    render();
  };

  var nextBtn = document.getElementById("nextBtn");
  if(nextBtn) nextBtn.onclick = function(){
    if(s.idx<2){ s.idx++; s.primary=null; s.supporting=[]; s.revealed=false; state.selectedChip=null; render(); }
    else {
      state.screen="results";
      render();
      confettiBurst();
    }
  };
}

/* ================= INIT ================= */
initGame();
render();

})();
</script>
</body>
</html>
